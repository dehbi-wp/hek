<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Blitz - Asah IQ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: #16213e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .hidden { display: none; }

        button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover { background: #e94560; }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 100px;
            font-size: 1.2rem;
            text-align: center;
        }

        .stat-box {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-weight: bold;
            color: #4db8ff;
        }

        #display-area {
            font-size: 2.5rem;
            margin: 30px 0;
            min-height: 80px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🧠 Brain Blitz</h1>
    
    <div id="menu">
        <p>Pilih Mode Latihan:</p>
        <button onclick="startGame('math')">🔢 Matematika Cepat</button>
        <button onclick="startGame('memory')">🧠 Ingatan Urutan</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="stat-box">
            <span>Skor: <span id="score">0</span></span>
            <span>Waktu: <span id="timer">30</span>s</span>
        </div>
        
        <div id="display-area"></div>
        
        <div id="input-section">
            <input type="number" id="answer-input" placeholder="?">
            <button onclick="checkAnswer()">Kirim</button>
        </div>
        
        <button onclick="backToMenu()" style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">Menyerah</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let currentMode = '';
    let correctAnswer = null;
    let timerInterval;

    const displayArea = document.getElementById('display-area');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const inputField = document.getElementById('answer-input');

    function startGame(mode) {
        currentMode = mode;
        score = 0;
        timeLeft = 30;
        gameActive = true;
        
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        scoreDisplay.innerText = score;
        timerDisplay.innerText = timeLeft;
        
        inputField.value = '';
        inputField.focus();

        startTimer();
        nextQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function nextQuestion() {
        inputField.value = '';
        if (currentMode === 'math') {
            const a = Math.floor(Math.random() * 20) + 1;
            const b = Math.floor(Math.random() * 20) + 1;
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            
            displayArea.innerText = `${a} ${op} ${b}`;
            correctAnswer = eval(`${a}${op}${b}`);
        } else if (currentMode === 'memory') {
            const num = Math.floor(Math.random() * 9000) + 1000;
            displayArea.innerText = num;
            correctAnswer = num;
            
            // Sembunyikan angka setelah 1 detik
            setTimeout(() => {
                if(gameActive) displayArea.innerText = "****";
            }, 1000);
        }
    }

    function checkAnswer() {
        const userVal = parseInt(inputField.value);
        if (userVal === correctAnswer) {
            score += 10;
            scoreDisplay.innerText = score;
            nextQuestion();
        } else {
            // Flash merah jika salah
            document.body.style.backgroundColor = "#501010";
            setTimeout(() => document.body.style.backgroundColor = "#1a1a2e", 200);
        }
        inputField.value = '';
        inputField.focus();
    }

    // Support menekan tombol Enter
    inputField.addEventListener("keyup", (event) => {
        if (event.key === "Enter") checkAnswer();
    });

    function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        alert(`Waktu Habis! Skor Akhir Anda: ${score}`);
        backToMenu();
    }

    function backToMenu() {
        clearInterval(timerInterval);
        gameActive = false;
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
    }
</script>

</body>
</html>
